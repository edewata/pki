name: Sub-CA with external cert on Kryoptic
# This test will perform the following operations:
# - create Kryoptic token
# - create root CA
# - create sub CA (step 1)
# - issue sub CA cert
# - create sub CA (step 2)
# - remove sub CA
# - remove Kryoptic token

on: workflow_call

env:
  DS_IMAGE: ${{ vars.DS_IMAGE || 'quay.io/389ds/dirsrv' }}

jobs:
  # docs/installation/ca/installing-ca-with-external-ca-signing-certificate.adoc
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      SHARED: /tmp/workdir/pki
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Retrieve PKI images
        uses: actions/cache@v4
        with:
          key: pki-images-${{ github.sha }}
          path: pki-images.tar

      - name: Load PKI images
        run: docker load --input pki-images.tar

      - name: Create network
        run: docker network create example

      - name: Set up DS container
        run: |
          tests/bin/ds-create.sh \
              --image=${{ env.DS_IMAGE }} \
              --hostname=ds.example.com \
              --network=example \
              --network-alias=ds.example.com \
              --password=Secret.123 \
              ds

      - name: Set up PKI container
        run: |
          tests/bin/runner-init.sh \
              --hostname=pki.example.com \
              --network=example \
              --network-alias=pki.example.com \
              pki

      - name: Install Kryoptic
        run: |
          # install OpenDNSSEC to ensure no conflicts
          # https://github.com/dogtagpki/pki/issues/5045
          docker exec pki dnf install -y kryoptic opensc opendnssec

          docker exec pki rpm -ql kryoptic
          docker exec pki cat /usr/share/p11-kit/modules/kryoptic.module

          # check with OpenSC
          # NOTE: the command fails if there's no token
          docker exec pki pkcs11-tool \
              --module /usr/lib64/pkcs11/libkryoptic_pkcs11.so \
              --show-info || true

          # check with OpenSC
          # NOTE: the command fails if there's no token
          docker exec pki pkcs11-tool \
              --module /usr/lib64/pkcs11/libkryoptic_pkcs11.so \
              --list-slots || true

          # check with NSS
          docker exec pki modutil -nocertdb -list

      # https://github.com/dogtagpki/pki/wiki/Kryoptic
      - name: Create Kryoptic token
        run: |
          # create password file for HSM
          echo "Secret.HSM" > password.hsm

          # configure token
          docker exec pki runuser -u pkiuser -- \
              mkdir -p /home/pkiuser/.config/kryoptic

          docker exec -i pki runuser -u pkiuser -- \
              tee /home/pkiuser/.config/kryoptic/token.conf << EOF
          [[slots]]
          slot = 1
          dbtype = "sqlite"
          dbargs = "/home/pkiuser/.config/kryoptic/token.sql"
          objects_dedup = "TrustOnly"
          EOF

          # check with OpenSC
          docker exec pki runuser -u pkiuser -- \
              pkcs11-tool \
              --module /usr/lib64/pkcs11/libkryoptic_pkcs11.so \
              --list-slots

          # initialize token and SO PIN
          docker exec pki runuser -u pkiuser -- \
              pkcs11-tool \
              --module /usr/lib64/pkcs11/libkryoptic_pkcs11.so \
              --label HSM \
              --so-pin $(cat password.hsm) \
              --init-token

          # initialize user PIN
          docker exec pki runuser -u pkiuser -- \
              pkcs11-tool \
              --module /usr/lib64/pkcs11/libkryoptic_pkcs11.so \
              --login \
              --login-type so \
              --so-pin $(cat password.hsm) \
              --pin $(cat password.hsm) \
              --init-pin

          # check with OpenSC
          docker exec pki runuser -u pkiuser -- \
              pkcs11-tool \
              --module /usr/lib64/pkcs11/libkryoptic_pkcs11.so \
              --list-slots

          # check with NSS
          docker exec pki runuser -u pkiuser -- \
              modutil -nocertdb -list

      - name: Create root CA
        run: |
          docker exec pki pki \
              -d rootca \
              nss-cert-request \
              --subject "CN=Root CA Signing Certificate" \
              --ext /usr/share/pki/server/certs/ca_signing.conf \
              --csr root-ca_signing.csr

          docker exec pki pki \
              -d rootca \
              nss-cert-issue \
              --csr root-ca_signing.csr \
              --ext /usr/share/pki/server/certs/ca_signing.conf \
              --cert root-ca_signing.crt

          docker exec pki openssl x509 -text -noout -in root-ca_signing.crt

          docker exec pki pki \
              -d rootca \
              nss-cert-import \
              --cert root-ca_signing.crt \
              --trust CT,C,C \
              root-ca_signing

      - name: Install sub CA (step 1)
        run: |
          docker exec pki pkispawn \
              -f /usr/share/pki/server/examples/installation/ca-external-cert-step1.cfg \
              -s CA \
              -D pki_cert_chain_nickname=root-ca_signing \
              -D pki_cert_chain_path=root-ca_signing.crt \
              -D pki_ds_url=ldap://ds.example.com:3389 \
              -D pki_hsm_enable=True \
              -D pki_token_name=HSM \
              -D pki_token_password=Secret.HSM \
              -D pki_ca_signing_token=HSM \
              -D pki_ocsp_signing_token=HSM \
              -D pki_audit_signing_token=HSM \
              -D pki_subsystem_token=HSM \
              -D pki_sslserver_token=HSM \
              -D pki_admin_nickname=admin \
              -D pki_ca_signing_csr_path=ca_signing.csr \
              --debug \
              > >(tee stdout) 2> >(tee stderr >&2)

      - name: Check for warnings
        if: always()
        run: |
          sed -n '/^WARNING:/p' stderr | tee output
          wc -l output

      - name: Check external commands
        if: always()
        run: |
          sed -n '/^DEBUG: Command:/p' stderr | tee output
          wc -l output

      - name: Check system certs and keys in internal token
        run: |
          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              nss-cert-find \
              | tee output

          # there should be no certs
          diff /dev/null output

          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              nss-key-find \
              | tee output

          # there should be no keys
          diff /dev/null output

      - name: Check system certs and keys in HSM
        run: |
          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              --token HSM \
              nss-cert-find \
              | tee output

          # there should be no certs
          diff /dev/null output

          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              --token HSM \
              nss-key-find \
              | tee output

          # normalize output
          sed \
              -e '/^ *Key ID:/d' \
              output > actual

          # there should be 1 key
          cat > expected << EOF
            Type: RSA
            Algorithm: RSA
          EOF

          diff expected actual

      - name: Issue sub CA signing cert
        run: |
          docker exec pki pki \
              -d rootca \
              nss-cert-issue \
              --issuer root-ca_signing \
              --csr ca_signing.csr \
              --ext /usr/share/pki/server/certs/subca_signing.conf \
              --cert ca_signing.crt

          docker exec pki openssl x509 -text -noout -in ca_signing.crt

      - name: Install sub CA (step 2)
        run: |
          docker exec pki pkispawn \
              -f /usr/share/pki/server/examples/installation/ca-external-cert-step2.cfg \
              -s CA \
              -D pki_cert_chain_nickname=root-ca_signing \
              -D pki_cert_chain_path=root-ca_signing.crt \
              -D pki_ds_url=ldap://ds.example.com:3389 \
              -D pki_hsm_enable=True \
              -D pki_token_name=HSM \
              -D pki_token_password=Secret.HSM \
              -D pki_ca_signing_token=HSM \
              -D pki_ocsp_signing_token=HSM \
              -D pki_audit_signing_token=HSM \
              -D pki_subsystem_token=HSM \
              -D pki_sslserver_token=HSM \
              -D pki_admin_nickname=admin \
              -D pki_ca_signing_csr_path=ca_signing.csr \
              -D pki_ca_signing_cert_path=ca_signing.crt \
              --debug \
              > >(tee stdout) 2> >(tee stderr >&2)

      - name: Check for warnings
        if: always()
        run: |
          sed -n '/^WARNING:/p' stderr | tee output
          wc -l output

      - name: Check external commands
        if: always()
        run: |
          sed -n '/^DEBUG: Command:/p' stderr | tee output
          wc -l output

      - name: Check system certs and keys in internal token
        run: |
          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              nss-cert-find \
              | tee output

          # normalize output
          sed \
              -e '/^ *Serial Number:/d' \
              -e '/^ *Not Valid Before:/d' \
              -e '/^ *Not Valid After:/d' \
              output > actual

          # there should be 1 cert
          cat > expected << EOF
            Nickname: root-ca_signing
            Subject DN: CN=Root CA Signing Certificate
            Issuer DN: CN=Root CA Signing Certificate
            Trust Flags: CT,C,C
          EOF

          diff expected actual

          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              nss-key-find \
              | tee output

          # there should be no keys
          diff /dev/null output

      - name: Check system certs and keys in HSM
        run: |
          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              --token HSM \
              nss-cert-find \
              | tee output
 
          # normalize output
          sed \
              -e '/^ *Serial Number:/d' \
              -e '/^ *Not Valid Before:/d' \
              -e '/^ *Not Valid After:/d' \
              output > actual

          # there should be 5 certs
          cat > expected << EOF
            Nickname: HSM:ca_signing
            Subject DN: CN=CA Signing Certificate,OU=pki-tomcat,O=EXAMPLE
            Issuer DN: CN=Root CA Signing Certificate
            Trust Flags: CTu,Cu,Cu

            Nickname: HSM:ca_ocsp_signing
            Subject DN: CN=CA OCSP Signing Certificate,OU=pki-tomcat,O=EXAMPLE
            Issuer DN: CN=CA Signing Certificate,OU=pki-tomcat,O=EXAMPLE
            Trust Flags: u,u,u

            Nickname: HSM:sslserver
            Subject DN: CN=pki.example.com,OU=pki-tomcat,O=EXAMPLE
            Issuer DN: CN=CA Signing Certificate,OU=pki-tomcat,O=EXAMPLE
            Trust Flags: u,u,u

            Nickname: HSM:subsystem
            Subject DN: CN=Subsystem Certificate,OU=pki-tomcat,O=EXAMPLE
            Issuer DN: CN=CA Signing Certificate,OU=pki-tomcat,O=EXAMPLE
            Trust Flags: u,u,u

            Nickname: HSM:ca_audit_signing
            Subject DN: CN=CA Audit Signing Certificate,OU=pki-tomcat,O=EXAMPLE
            Issuer DN: CN=CA Signing Certificate,OU=pki-tomcat,O=EXAMPLE
            Trust Flags: u,u,Pu
          EOF

          diff expected actual

          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              --token HSM \
              nss-key-find \
              | tee output

          # normalize output
          sed \
              -e '/^ *Key ID:/d' \
              output > actual

          # there should be 5 keys
          cat > expected << EOF
            Type: RSA
            Algorithm: RSA

            Type: RSA
            Algorithm: RSA

            Type: RSA
            Algorithm: RSA

            Type: RSA
            Algorithm: RSA

            Type: RSA
            Algorithm: RSA
          EOF

          diff expected actual

      - name: Run PKI healthcheck
        run: |
          docker exec pki runuser -u pkiuser -- \
              pki-healthcheck --failures-only

      - name: Check CA admin
        run: |
          docker exec pki pki nss-cert-import \
              --cert root-ca_signing.crt \
              --trust CT,C,C \
              root-ca_signing

          docker exec pki pki nss-cert-import \
              --cert ca_signing.crt \
              ca_signing

          docker exec pki pki pkcs12-import \
              --pkcs12 /root/.dogtag/pki-tomcat/ca_admin_cert.p12 \
              --password Secret.123

          docker exec pki pki -n admin ca-user-show caadmin

      - name: Check cert requests in CA
        run: |
          docker exec pki pki -n admin ca-cert-request-find

      - name: Remove sub CA
        run: |
          docker exec pki pkidestroy \
              -s CA \
              --debug \
              > >(tee stdout) 2> >(tee stderr >&2)

      - name: Check for warnings
        if: always()
        run: |
          sed -n '/^WARNING:/p' stderr | tee output
          wc -l output

      - name: Check external commands
        if: always()
        run: |
          sed -n '/^DEBUG: Command:/p' stderr | tee output
          wc -l output

      - name: Remove Kryoptic token
        run: |
          docker exec pki runuser -u pkiuser -- \
              rm -rf /home/pkiuser/.config/kryoptic

      - name: Check DS server systemd journal
        if: always()
        run: |
          docker exec ds journalctl -x --no-pager -u dirsrv@localhost.service

      - name: Check DS container logs
        if: always()
        run: |
          docker logs ds

      - name: Check PKI server systemd journal
        if: always()
        run: |
          docker exec pki journalctl -x --no-pager -u pki-tomcatd@pki-tomcat.service

      - name: Check sub CA debug log
        if: always()
        run: |
          docker exec pki find /var/lib/pki/pki-tomcat/logs/ca -name "debug.*" -exec cat {} \;
