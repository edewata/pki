name: CA with caTransportCert profile
# This test will perform the following operations:
# - install CA
# - enroll transport cert with PKCS #10 request
# - enroll transport cert with CRMF request without POP
# - enroll transport cert with CRMF request with POP

on: workflow_call

env:
  DS_IMAGE: ${{ vars.DS_IMAGE || 'quay.io/389ds/dirsrv' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      SHARED: /tmp/workdir/pki
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Retrieve PKI images
        uses: actions/cache@v4
        with:
          key: pki-images-${{ github.sha }}
          path: pki-images.tar

      - name: Load PKI images
        run: docker load --input pki-images.tar

      - name: Create network
        run: docker network create example

      - name: Set up DS container
        run: |
          tests/bin/ds-create.sh \
              --image=${{ env.DS_IMAGE }} \
              --hostname=ds.example.com \
              --network=example \
              --network-alias=ds.example.com \
              --password=Secret.123 \
              ds

      - name: Set up PKI container
        run: |
          tests/bin/runner-init.sh \
              --hostname=pki.example.com \
              --network=example \
              --network-alias=pki.example.com \
              pki

          docker exec pki dnf install -y dumpasn1

      - name: Install CA
        run: |
          docker exec pki pkispawn \
              -f /usr/share/pki/server/examples/installation/ca.cfg \
              -s CA \
              -D pki_ds_url=ldap://ds.example.com:3389 \
              -v

      - name: Set up CA admin
        run: |
          docker exec pki pki-server cert-export ca_signing --cert-file ca_signing.crt

          docker exec pki pki nss-cert-import \
              --cert ca_signing.crt \
              --trust CT,C,C \
              ca_signing

          docker exec pki pki pkcs12-import \
              --pkcs12 /root/.dogtag/pki-tomcat/ca_admin_cert.p12 \
              --pkcs12-password Secret.123

      - name: "Check enrollment with PKCS #10 request"
        run: |
          # generate PKCS #10 request
          docker exec pki pki nss-cert-request \
              --subject "CN=transport-pkcs10" \
              --csr transport-pkcs10.csr

          docker exec pki cat transport-pkcs10.csr

          docker exec pki AtoB transport-pkcs10.csr transport-pkcs10.der

          # ignore dumpasn1 failure due to invalid PKCS #10 data
          docker exec pki dumpasn1 transport-pkcs10.der || true

          # issue cert
          docker exec pki pki \
              -n caadmin \
              ca-cert-issue \
              --profile caTransportCert \
              --csr-file transport-pkcs10.csr \
              --output-file transport-pkcs10.crt

          # import cert
          docker exec pki pki nss-cert-import \
              --cert transport-pkcs10.crt \
              transport-pkcs10

          docker exec pki pki nss-cert-show transport-pkcs10 | tee output

          # normalize output
          sed \
              -e '/^ *Serial Number:/d' \
              -e '/^ *Not Valid Before:/d' \
              -e '/^ *Not Valid After:/d' \
              output > actual

          # the cert should match the key (trust flags must be u,u,u)
          cat > expected << EOF
            Nickname: transport-pkcs10
            Subject DN: CN=transport-pkcs10
            Issuer DN: CN=CA Signing Certificate,OU=pki-tomcat,O=EXAMPLE
            Trust Flags: u,u,u
          EOF

          diff expected actual

      - name: Check enrollment with CRMF request without POP
        run: |
          # generate CRMF request
          docker exec pki pki nss-cert-request \
              --type crmf \
              --subject "CN=transport-crmf-without-pop" \
              --csr transport-crmf-without-pop.csr

          docker exec pki cat transport-crmf-without-pop.csr

          docker exec pki AtoB transport-crmf-without-pop.csr transport-crmf-without-pop.der
          docker exec pki dumpasn1 transport-crmf-without-pop.der

          # issue cert
          docker exec pki pki \
              -n caadmin \
              ca-cert-issue \
              --request-type crmf \
              --profile caTransportCert \
              --subject CN=transport-crmf-without-pop \
              --csr-file transport-crmf-without-pop.csr \
              --output-file transport-crmf-without-pop.crt

          # import cert
          docker exec pki pki nss-cert-import \
              --cert transport-crmf-without-pop.crt \
              transport-crmf-without-pop

          docker exec pki pki nss-cert-show transport-crmf-without-pop | tee output

          # normalize output
          sed \
              -e '/^ *Serial Number:/d' \
              -e '/^ *Not Valid Before:/d' \
              -e '/^ *Not Valid After:/d' \
              output > actual

          # the cert should match the key (trust flags must be u,u,u)
          cat > expected << EOF
            Nickname: transport-crmf-without-pop
            Subject DN: CN=transport-crmf-without-pop
            Issuer DN: CN=CA Signing Certificate,OU=pki-tomcat,O=EXAMPLE
            Trust Flags: u,u,u
          EOF

          diff expected actual

      - name: Check enrollment with CRMF request with POP
        run: |
          # generate CRMF request
          docker exec pki pki nss-cert-request \
              --type crmf \
              --pop \
              --subject "CN=transport-crmf-with-pop" \
              --csr transport-crmf-with-pop.csr

          docker exec pki cat transport-crmf-with-pop.csr

          docker exec pki AtoB transport-crmf-with-pop.csr transport-crmf-with-pop.der
          docker exec pki dumpasn1 transport-crmf-with-pop.der

          # issue cert
          docker exec pki pki \
              -n caadmin \
              ca-cert-issue \
              --request-type crmf \
              --profile caTransportCert \
              --subject CN=transport-crmf-with-pop \
              --csr-file transport-crmf-with-pop.csr \
              --output-file transport-crmf-with-pop.crt

          # import cert
          docker exec pki pki nss-cert-import \
              --cert transport-crmf-with-pop.crt \
              transport-crmf-with-pop

          docker exec pki pki nss-cert-show transport-crmf-with-pop | tee output

          # normalize output
          sed \
              -e '/^ *Serial Number:/d' \
              -e '/^ *Not Valid Before:/d' \
              -e '/^ *Not Valid After:/d' \
              output > actual

          # the cert should match the key (trust flags must be u,u,u)
          cat > expected << EOF
            Nickname: transport-crmf-with-pop
            Subject DN: CN=transport-crmf-with-pop
            Issuer DN: CN=CA Signing Certificate,OU=pki-tomcat,O=EXAMPLE
            Trust Flags: u,u,u
          EOF

          diff expected actual

      - name: Remove CA
        run: |
          docker exec pki pkidestroy -s CA -v

      - name: Check for core dumps
        if: failure()
        run: |
          docker exec pki ls -l
          docker exec pki find / -path /proc -prune -o -name "hs_err_pid*.log" -exec cat {} \;

      - name: Check PKI server systemd journal
        if: always()
        run: |
          docker exec pki journalctl -x --no-pager -u pki-tomcatd@pki-tomcat.service

      - name: Check CA debug log
        if: always()
        run: |
          docker exec pki find /var/lib/pki/pki-tomcat/logs/ca -name "debug.*" -exec cat {} \;
