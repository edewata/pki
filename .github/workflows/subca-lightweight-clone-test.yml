name: Lightweight SubCA clone

on: workflow_call

env:
  DS_IMAGE: ${{ vars.DS_IMAGE || 'quay.io/389ds/dirsrv' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      SHARED: /tmp/workdir/pki
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Retrieve PKI images
        uses: actions/cache@v4
        with:
          key: pki-images-${{ github.sha }}
          path: pki-images.tar

      - name: Load PKI images
        run: docker load --input pki-images.tar

      - name: Create network
        run: docker network create example

      - name: Set up primary DS container
        run: |
          tests/bin/ds-create.sh \
              --image=${{ env.DS_IMAGE }} \
              --hostname=primaryds.example.com \
              --network=example \
              --network-alias=primaryds.example.com \
              --password=Secret.123 \
              primaryds

      - name: Set up secondary DS container
        run: |
          tests/bin/ds-create.sh \
              --image=${{ env.DS_IMAGE }} \
              --hostname=secondaryds.example.com \
              --network=example \
              --network-alias=secondaryds.example.com \
              --password=Secret.123 \
              secondaryds

      - name: Set up PKI container
        run: |
          tests/bin/runner-init.sh \
              --hostname=pki.example.com \
              --network=example \
              --network-alias=pki.example.com \
              pki

      - name: Install dependencies
        run: |
          docker exec pki dnf install -y softhsm

      - name: Create SoftHSM token
        run: |
          # allow PKI user to access SoftHSM files
          docker exec pki usermod pkiuser -a -G ods

          # create SoftHSM token for PKI server
          docker exec pki runuser -u pkiuser -- \
              softhsm2-util \
              --init-token \
              --label HSM \
              --so-pin Secret.HSM \
              --pin Secret.HSM \
              --free

      - name: Install primary CA
        run: |
          docker exec pki pkispawn \
              -f /usr/share/pki/server/examples/installation/ca.cfg \
              -s CA \
              -D pki_instance_name=primary \
              -D pki_hsm_enable=True \
              -D pki_token_name=HSM \
              -D pki_token_password=Secret.HSM \
              -D pki_ca_signing_token=HSM \
              -D pki_ocsp_signing_token=HSM \
              -D pki_audit_signing_token=HSM \
              -D pki_subsystem_token=HSM \
              -D pki_sslserver_token=internal \
              -D pki_ds_url=ldap://primaryds.example.com:3389 \
              -v

      - name: Install CA admin cert in primary PKI container
        run: |
          docker exec pki pki-server cert-export \
              -i primary \
              --cert-file $SHARED/ca_signing.crt \
              ca_signing

          docker exec pki pki nss-cert-import \
              --cert $SHARED/ca_signing.crt \
              --trust CT,C,C \
              ca_signing

          docker exec pki pki pkcs12-import \
              --pkcs12 /root/.dogtag/primary/ca_admin_cert.p12 \
              --pkcs12-password Secret.123

      - name: Check initial authorities in primary CA
        run: |
          docker exec pki pki -n caadmin ca-authority-find | tee output

          # there should be 1 authority initially
          echo "1" > expected
          sed -n 's/^\s*ID:\s*\(.*\)$/\1/p' output | wc -l > actual

          diff expected actual

          # it should be a host CA
          echo "true" > expected
          sed -n 's/^\s*Host authority:\s*\(.*\)$/\1/p' output > actual
          diff expected actual

          # store host CA ID
          sed -n 's/^\s*ID:\s*\(.*\)$/\1/p' output > hostca-id

      - name: Enable authority sync job in primary CA
        run: |
          #docker exec pki pki-server ca-config-set \
          #    -i primary \
          #    features.authority.keyRetrieverClass com.netscape.ca.ExternalProcessKeyRetriever

          #docker exec pki pki-server ca-config-set \
          #    -i primary \
          #    features.authority.keyRetrieverConfig.executable /usr/libexec/ipa/ipa-pki-retrieve-key

          # docker exec pki pki-server ca-config-set -i primary ca.authorityMonitor.enable false
          docker exec pki pki-server ca-config-set -i primary jobsScheduler.enabled true
          docker exec pki pki-server ca-config-set -i primary jobsScheduler.job.authoritySync.enabled true

          docker exec pki pki-server ca-redeploy -i primary --wait

      - name: Install secondary CA
        run: |
          docker exec pki pkispawn \
              -f /usr/share/pki/server/examples/installation/ca-clone.cfg \
              -s CA \
              -D pki_instance_name=secondary \
              -D pki_cert_chain_path=$SHARED/ca_signing.crt \
              -D pki_hsm_enable=True \
              -D pki_token_name=HSM \
              -D pki_token_password=Secret.HSM \
              -D pki_ca_signing_token=HSM \
              -D pki_ocsp_signing_token=HSM \
              -D pki_audit_signing_token=HSM \
              -D pki_subsystem_token=HSM \
              -D pki_sslserver_token=internal \
              -D pki_ds_url=ldap://secondaryds.example.com:3389 \
              -D pki_clone_uri=https://pki.example.com:8443 \
              -D pki_security_domain_uri=https://pki.example.com:8443 \
              -D pki_http_port=9080 \
              -D pki_https_port=9443 \
              -D pki_tomcat_server_port=9005 \
              -v

      - name: Check initial authorities in secondary CA
        run: |
          docker exec pki pki \
              -U https://pki.example.com:9443 \
              -n caadmin \
              ca-authority-find | tee output

          # there should be 1 authority initially
          echo "1" > expected
          sed -n 's/^\s*ID:\s*\(.*\)$/\1/p' output | wc -l > actual

          diff expected actual

          # it should be a host CA
          echo "true" > expected
          sed -n 's/^\s*Host authority:\s*\(.*\)$/\1/p' output > actual
          diff expected actual

          # store host CA ID
          sed -n 's/^\s*ID:\s*\(.*\)$/\1/p' output > actual
          diff hostca-id actual

      - name: Enable authority sync job in secondary CA
        run: |
          # docker exec pki pki-server ca-config-set \
          #     -i secondary \
          #     ca.authorityMonitor.enable false
          docker exec pki pki-server ca-config-set -i secondary jobsScheduler.enabled true
          docker exec pki pki-server ca-config-set -i secondary jobsScheduler.job.authoritySync.enabled true

          docker exec pki pki-server ca-redeploy -i secondary --wait

      - name: Create authority in primary CA
        run: |
          HOSTCA_ID=$(cat hostca-id)

          docker exec pki pki \
              -n caadmin \
              ca-authority-create \
              --parent $HOSTCA_ID \
              CN="Lightweight CA" | tee output

          # store LWCA ID
          sed -n 's/^\s*ID:\s*\(.*\)$/\1/p' output > lwca-id
          LWCA_ID=$(cat lwca-id)

          docker exec pki pki -n caadmin ca-authority-find | tee output

          echo -e "$HOSTCA_ID\n$LWCA_ID" | sort > expected
          sed -n 's/^\s*ID:\s*\(.*\)$/\1/p' output | sort > actual
          diff expected actual

      - name: Check authorities in secondary CA
        run: |
          HOSTCA_ID=$(cat hostca-id)
          LWCA_ID=$(cat lwca-id)

          docker exec pki pki \
              -U https://pki.example.com:9443 \
              -n caadmin \
              ca-authority-find | tee output

          # there should be 2 authorities
          echo -e "$HOSTCA_ID\n$LWCA_ID" | sort > expected
          sed -n 's/^\s*ID:\s*\(.*\)$/\1/p' output | sort > actual
          diff expected actual

      - name: Synchronize authorities
        run: |
          docker exec pki pki \
             -n caadmin \
             ca-authority-key-export \
             --wrap-nickname \
             --target-nickname \
             --algorithm \
             -o
          docker exec pki pki \
             -n caadmin \
             ca-authority-key-export \
             --wrap-nickname \
             --target-nickname \
             --algorithm \
             -o

          docker exec pki pki \
              -n caadmin \
              ca-job-start \
              authoritySync

          docker exec pki pki \
              -U https://pki.example.com:9443 \
              -n caadmin \
              ca-job-start \
              authoritySync

      - name: Check authorities in secondary CA after synchronization
        run: |
          HOSTCA_ID=$(cat hostca-id)
          LWCA_ID=$(cat lwca-id)

          docker exec pki pki \
              -U https://pki.example.com:9443 \
              -n caadmin \
              ca-authority-find | tee output

          # there should be 2 authorities
          echo -e "$HOSTCA_ID\n$LWCA_ID" | sort > expected
          sed -n 's/^\s*ID:\s*\(.*\)$/\1/p' output | sort > actual
          diff expected actual

      - name: Remove secondary CA
        run: |
          docker exec pki pkidestroy -i secondary -s CA -v

      - name: Remove primary CA
        run: |
          docker exec pki pkidestroy -i primary -s CA -v

      - name: Check primary DS server systemd journal
        if: always()
        run: |
          docker exec primaryds journalctl -x --no-pager -u dirsrv@localhost.service

      - name: Check primary DS container logs
        if: always()
        run: |
          docker logs primaryds

      - name: Check primary PKI server systemd journal
        if: always()
        run: |
          docker exec pki journalctl -x --no-pager -u pki-tomcatd@primary.service

      - name: Check primary PKI server access log
        if: always()
        run: |
          docker exec pki find /var/log/pki/primary -name "localhost_access_log.*" -exec cat {} \;

      - name: Check primary CA debug log
        if: always()
        run: |
          docker exec pki find /var/lib/pki/primary/logs/ca -name "debug.*" -exec cat {} \;

      - name: Check secondary DS server systemd journal
        if: always()
        run: |
          docker exec secondaryds journalctl -x --no-pager -u dirsrv@localhost.service

      - name: Check secondary DS container logs
        if: always()
        run: |
          docker logs secondaryds

      - name: Check secondary PKI server systemd journal
        if: always()
        run: |
          docker exec pki journalctl -x --no-pager -u pki-tomcatd@secondary.service

      - name: Check secondary PKI server access log
        if: always()
        run: |
          docker exec pki find /var/log/pki/secondary -name "localhost_access_log.*" -exec cat {} \;

      - name: Check secondary CA debug log
        if: always()
        run: |
          docker exec pki find /var/lib/pki/secondary/logs/ca -name "debug.*" -exec cat {} \;
