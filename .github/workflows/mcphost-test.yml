name: MCPHost

on: workflow_call
#on: [push, pull_request]

env:
  DS_IMAGE: ${{ vars.DS_IMAGE || 'quay.io/389ds/dirsrv' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      SHARED: /tmp/workdir/pki
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install jq
          pip install uv uvenv

      - name: Clone PKI repository
        uses: actions/checkout@v4

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Run llama3.2
        run: |
          ollama run llama3.2

      - name: Install MCPHost
        run: |
          go version
          GOPATH=$(go env GOPATH)
          echo $GOPATH
          mkdir -p $GOPATH/src/github.com/mark3labs

          cd $GOPATH/src/github.com/mark3labs
          git clone https://github.com/mark3labs/mcphost.git

          cd mcphost
          go install

          ls -la $GOPATH
          ls -la $GOPATH/bin
          ls -la $GOPATH/pkg

      - name: Install PKI MCP
        run: |
          uv init base/ca/python --name pki-ca
          cd base/ca/python
          pwd

          uv venv
          source .venv/bin/activate

          uv add "mcp[cli]"
          #uv add mcp mcp.server

          ls -la
          cat main.py
          cat pyproject.toml
 
      - name: Check PKI MCP
        run: |
          uv \
              --directory base/ca/python \
              run \
              pki/server/ca/main.py

      - name: Configure mcphost
        run: |
          ls -la
          cat > mcp.json << EOF
          {
            "mcpServers": {
              "pki-mcp": {
                "command": "uv",
                "args": [
                    "--directory",
                    "/home/runner/work/pki/pki/base/ca/python",
                    "run",
                    "pki/server/ca/main.py"
                ]
              }
            }
          }
          EOF

      - name: Run mcphost
        run: |
          GOPATH=$(go env GOPATH)
          echo "show me all users" | $GOPATH/bin/mcphost -m ollama:llama3.2:latest --config mcp.json --debug

      - name: Retrieve PKI images
        uses: actions/cache@v4
        with:
          key: pki-images-${{ github.sha }}
          path: pki-images.tar

      - name: Load PKI images
        run: docker load --input pki-images.tar

      - name: Set up runner container
        run: |
          tests/bin/runner-init.sh \
              --hostname=pki.example.com \
              pki
