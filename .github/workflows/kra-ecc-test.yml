          # the cert should match the key (trust flags must be u,u,u)
          cat > expected << EOF
            Nickname: test-PKI-CLI-with-POP
            Subject DN: UID=test-PKI-CLI-with-POP
            Issuer DN: CN=CA Signing Certificate,OU=pki-tomcat,O=EXAMPLE
            Trust Flags: u,u,u
          EOF

          diff expected actual

      - name: Check key requests after recovery
        run: |
          docker exec pki pki \
              -n caadmin \
              kra-key-request-find \
              | tee output

          # normalize output
          sed \
              -e '/-----/d' \
              -e '/entries matched/d' \
              -e '/Number of entries returned/d' \
              -e '/^ *Request ID:/d' \
              -e '/^ *Key ID:/d' \
              -e '/^ *Creation Time:/d' \
              -e '/^ *Modification Time:/d' \
              output > actual

          # there should be 4 key requests
          cat > expected << EOF
            Type: enrollment
            Status: complete

            Type: recovery
            Status: complete

            Type: enrollment
            Status: complete

            Type: recovery
            Status: complete

            Type: enrollment
            Status: complete

            Type: recovery
            Status: complete

            Type: enrollment
            Status: complete

            Type: recovery
            Status: complete
          EOF

          diff expected actual

      - name: Check keys after recovery
        run: |
          docker exec pki pki \
              -n caadmin \
              kra-key-find \
              | tee output

          # normalize output
          sed \
              -e '/-----/d' \
              -e '/key(s) matched/d' \
              -e '/Number of entries returned/d' \
              -e '/^ *Request ID:/d' \
              -e '/^ *Key ID:/d' \
              -e '/^ *Creation Time:/d' \
              -e '/^ *Modification Time:/d' \
              output > actual

          # there should be 4 keys
          # NOTE: test-CRMFPopClient-with-POP and test-PKI-CLI-with-POP keys don't have a status
          cat > expected << EOF
            Algorithm: 1.2.840.10045.2.1
            Size: -1
            Owner: UID=test-CRMFPopClient-without-POP

            Algorithm: 1.2.840.10045.2.1
            Size: -1
            Owner: UID=test-CRMFPopClient-with-POP

            Algorithm: 1.2.840.10045.2.1
            Size: -1
            Owner: UID=test-PKI-CLI-without-POP

            Algorithm: 1.2.840.10045.2.1
            Size: -1
            Owner: UID=test-PKI-CLI-with-POP
          EOF

          diff expected actual

      - name: Remove KRA
        run: docker exec pki pkidestroy -s KRA -v

      - name: Remove CA
        run: docker exec pki pkidestroy -s CA -v

      - name: Check PKI server systemd journal
        if: always()
        run: |
          docker exec pki journalctl -x --no-pager -u pki-tomcatd@pki-tomcat.service

      - name: Check PKI server access log
        if: always()
        run: |
          docker exec pki find /var/log/pki/pki-tomcat -name "localhost_access_log.*" -exec cat {} \;

      - name: Check CA debug log
        if: always()
        run: |
          docker exec pki find /var/lib/pki/pki-tomcat/logs/ca -name "debug.*" -exec cat {} \;

      - name: Check KRA debug log
        if: always()
        run: |
          docker exec pki find /var/lib/pki/pki-tomcat/logs/kra -name "debug.*" -exec cat {} \;
