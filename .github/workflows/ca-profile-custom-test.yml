name: CA with custom profile
# Test will perform the following:
# - create a profile with wide chars in the name and description
# - enroll a user cert with wide chars in the subject DN
# - create a system user with wide chars in the full name
# - use the cert for authentication

on: workflow_call

env:
  DS_IMAGE: ${{ vars.DS_IMAGE || 'quay.io/389ds/dirsrv' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      SHARED: /tmp/workdir/pki
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Retrieve PKI images
        uses: actions/cache@v4
        with:
          key: pki-images-${{ github.sha }}
          path: pki-images.tar

      - name: Load PKI images
        run: docker load --input pki-images.tar

      - name: Create network
        run: docker network create example

      - name: Set up DS container
        run: |
          tests/bin/ds-create.sh \
              --image=${{ env.DS_IMAGE }} \
              --hostname=ds.example.com \
              --password=Secret.123 \
              ds

      - name: Connect DS container to network
        run: docker network connect example ds --alias ds.example.com

      - name: Set up PKI container
        run: |
          tests/bin/runner-init.sh pki
        env:
          HOSTNAME: pki.example.com

      - name: Connect PKI container to network
        run: docker network connect example pki --alias pki.example.com

      - name: Install CA
        run: |
          docker exec pki pkispawn \
              -f /usr/share/pki/server/examples/installation/ca.cfg \
              -s CA \
              -D pki_ds_url=ldap://ds.example.com:3389 \
              -v

      - name: Install CA admin cert
        run: |
          docker exec pki pki-server cert-export \
              --cert-file ca_signing.crt \
              ca_signing

          docker exec pki pki nss-cert-import \
              --cert ca_signing.crt \
              --trust CT,C,C \
              ca_signing

          docker exec pki pki pkcs12-import \
              --pkcs12 /root/.dogtag/pki-tomcat/ca_admin_cert.p12 \
              --password Secret.123

      - name: Create custom profile
        run: |
          # export caUserCert profile
          docker exec pki pki \
              -n caadmin \
              ca-profile-show \
              --output custom.cfg \
              --raw \
              caUserCert

          # update the profile ID and description
          docker exec pki sed -i \
              -e "s/^\(profileId\)=.*$/\1=custom/" \
              -e "s/^\(name\)=.*$/\1=五輪真弓/" \
              -e "s/^\(desc\)=.*$/\1=Certificate profile for 五輪真弓/" \
              custom.cfg

          # add custom profile
          docker exec pki pki \
              -n caadmin \
              ca-profile-add \
              --raw \
              custom.cfg

          # enable custom profile
          docker exec pki pki \
              -n caadmin \
              ca-profile-enable \
              custom

      - name: Check custom profile
        run: |
          docker exec pki pki \
              -n caadmin \
              ca-profile-show \
              custom

      - name: Create user cert using custom profile
        run: |
          # create cert request
          docker exec pki pki nss-cert-request \
              --subject "UID=testuser,CN=五輪真弓" \
              --ext /usr/share/pki/tools/examples/certs/testuser.conf \
              --csr testuser.csr

          # submit cert request
          docker exec pki pki ca-cert-request-submit \
              --profile custom \
              --csr-file testuser.csr \
              | tee output

          REQUEST_ID=$(sed -n "s/^\s*Request ID:\s*\(\S*\)$/\1/p" output)

          # approve cert request
          docker exec pki pki \
              -n caadmin \
              ca-cert-request-approve \
              --force \
              $REQUEST_ID \
              | tee output

          CERT_ID=$(sed -n "s/^\s*Certificate ID:\s*\(\S*\)$/\1/p" output)
          echo $CERT_ID > cert.id

      - name: Check user cert
        run: |
          CERT_ID=$(cat cert.id)

          docker exec pki pki ca-cert-show $CERT_ID \
              | sed -n \
                  -e "/^\s*Subject DN:/p" \
              | tee output

          cat > expected << EOF
            Subject DN: UID=testuser,CN=五輪真弓
          EOF
          
          diff expected output

      - name: Create test user using user cert
        run: |
          CERT_ID=$(cat cert.id)

          # export cert
          docker exec pki pki ca-cert-export \
              --output-file testuser.crt \
              $CERT_ID

          docker exec pki pki \
              -n caadmin \
              ca-user-add \
              --full-name "五輪真弓" \
              --type adminType \
              --cert-file testuser.crt \
              testuser

          docker exec pki pki \
              -n caadmin \
              ca-user-membership-add \
              testuser \
              "Administrators"

      - name: Check test user using pki ca-user-show
        run: |
          docker exec pki pki \
              -n caadmin \
              ca-user-show \
              testuser \
              | tee output

          cat > expected << EOF
          ---------------
          User "testuser"
          ---------------
            User ID: testuser
            Full name: 五輪真弓
            Type: adminType
          EOF

          diff expected output

      - name: Check test user using pki-server ca-user-show
        run: |
          docker exec pki pki-server ca-user-show \
              testuser \
              | tee output

          cat > expected << EOF
            User ID: testuser
            Full Name: 五輪真弓
            Type: adminType
          EOF

          diff expected output

      - name: Check test user authentication
        run: |
          # import cert
          docker exec pki pki nss-cert-import \
              --cert testuser.crt \
              testuser

          # authenticate as test user
          docker exec pki pki \
              -n testuser \
              ca-user-show \
              testuser \
              | tee output

          cat > expected << EOF
          ---------------
          User "testuser"
          ---------------
            User ID: testuser
            Full name: 五輪真弓
            Type: adminType
          EOF

          diff expected output

      - name: Remove CA
        run: docker exec pki pkidestroy -s CA -v

      - name: Check PKI server systemd journal
        if: always()
        run: |
          docker exec pki journalctl -x --no-pager -u pki-tomcatd@pki-tomcat.service

      - name: Check PKI server access log
        if: always()
        run: |
          docker exec pki find /var/log/pki/pki-tomcat -name "localhost_access_log.*" -exec cat {} \;

      - name: Check CA debug log
        if: always()
        run: |
          docker exec pki find /var/lib/pki/pki-tomcat/logs/ca -name "debug.*" -exec cat {} \;
