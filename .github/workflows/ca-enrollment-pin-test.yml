name: CA with PIN-based enrollment

on: workflow_call

env:
  DB_IMAGE: ${{ vars.DB_IMAGE || 'quay.io/389ds/dirsrv' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      SHARED: /tmp/workdir/pki
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Retrieve PKI images
        uses: actions/cache@v4
        with:
          key: pki-images-${{ github.sha }}
          path: pki-images.tar

      - name: Load PKI images
        run: docker load --input pki-images.tar

      - name: Create network
        run: docker network create example

      - name: Set up DS container
        run: |
          tests/bin/ds-container-create.sh ds
        env:
          IMAGE: ${{ env.DB_IMAGE }}
          HOSTNAME: ds.example.com
          PASSWORD: Secret.123

      - name: Connect DS container to network
        run: docker network connect example ds --alias ds.example.com

      - name: Set up PKI container
        run: |
          tests/bin/runner-init.sh pki
        env:
          HOSTNAME: pki.example.com

      - name: Connect PKI container to network
        run: docker network connect example pki --alias pki.example.com

      - name: Install CA
        run: |
          docker exec pki pkispawn \
              -f /usr/share/pki/server/examples/installation/ca.cfg \
              -s CA \
              -D pki_ds_url=ldap://ds.example.com:3389 \
              -v

      - name: Check CA admin
        run: |
          docker exec pki pki-server cert-export ca_signing --cert-file ca_signing.crt
          docker exec pki pki client-cert-import ca_signing --ca-cert ca_signing.crt
          docker exec pki pki pkcs12-import \
              --pkcs12 /root/.dogtag/pki-tomcat/ca_admin_cert.p12 \
              --pkcs12-password Secret.123
          docker exec pki pki -n caadmin ca-user-show caadmin

      - name: Add LDAP users
        run: |
          docker exec -i pki ldapadd \
              -H ldap://ds.example.com:3389 \
              -D "cn=Directory Manager" \
              -w Secret.123 << EOF
          dn: ou=people,dc=example,dc=com
          objectclass: top
          objectclass: organizationalUnit
          ou: people
          aci: (target = "ldap:///ou=people,dc=example,dc=com")
           (targetattr=objectClass||dc||ou||uid||cn||sn||givenName)
           (version 3.0; acl "Allow anyone to read and search basic attributes"; allow (search, read) userdn = "ldap:///anyone";)
          aci: (target = "ldap:///ou=people,dc=example,dc=com")
           (targetattr=*)
           (version 3.0; acl "Allow anyone to read and search itself"; allow (search, read) userdn = "ldap:///self";)

          dn: uid=pinmanager,ou=people,dc=example,dc=com
          objectClass: person
          objectClass: organizationalPerson
          objectClass: inetOrgPerson
          uid: pinmanager
          cn: PIN Manager
          sn: User
          userPassword: Secret.123

          dn: uid=testuser,ou=people,dc=example,dc=com
          objectClass: person
          objectClass: organizationalPerson
          objectClass: inetOrgPerson
          uid: testuser
          cn: Test User
          sn: User
          userPassword: Secret.123
          EOF

      - name: Update LDAP schema
        run: |
          docker exec pki cp /usr/share/pki/tools/setpin.conf .
          docker exec pki sed -i \
              -e "s/^host=.*$/host=ds.example.com/g" \
              -e "s/^port=.*$/port=3389/g" \
              -e "s/^binddn=.*$/binddn=cn=Directory Manager/g" \
              -e "s/^bindpw=.*$/bindpw=Secret.123/g" \
              -e "s/^pinmanager=.*$/pinmanager=uid=pinmanager,ou=people,dc=example,dc=com/g" \
              -e "s/^pinmanagerpwd=.*$/pinmanagerpwd=Secret.123/g" \
              -e "s/^basedn=.*$/basedn=ou=people,dc=example,dc=com/g" \
              setpin.conf

          docker exec pki setpin \
              optfile=setpin.conf \
              debug=attrs

          docker exec pki ldapsearch \
              -H ldap://ds.example.com:3389 \
              -D "cn=Directory Manager" \
              -w Secret.123 \
              -b "ou=people,dc=example,dc=com" \
              -o ldif_wrap=no \
              -LLL

      - name: Check current PIN
        run: |
          docker exec pki sed -i \
              -e "s/^setup=.*$/setup=no/g" \
              setpin.conf

          docker exec pki setpin \
              host=ds.example.com \
              port=3389 \
              binddn="uid=pinmanager,ou=people,dc=example,dc=com" \
              bindpw=Secret.123 \
              basedn="ou=people,dc=example,dc=com" \
              filter="(objectClass=person)" \
              optfile=setpin.conf \
              debug=attrs

      - name: Set new PIN
        run: |
          docker exec pki setpin \
              host=ds.example.com \
              port=3389 \
              binddn="uid=pinmanager,ou=people,dc=example,dc=com" \
              bindpw=Secret.123 \
              basedn="ou=people,dc=example,dc=com" \
              filter="(objectClass=person)" \
              write \
              debug=attrs

      - name: Remove CA
        run: docker exec pki pkidestroy -i pki-tomcat -s CA -v

      - name: Check PKI server systemd journal
        if: always()
        run: |
          docker exec pki journalctl -x --no-pager -u pki-tomcatd@pki-tomcat.service

      - name: Check CA debug log
        if: always()
        run: |
          docker exec pki find /var/log/pki/pki-tomcat/ca -name "debug.*" -exec cat {} \;

      - name: Gather artifacts
        if: always()
        run: |
          tests/bin/ds-artifacts-save.sh ds
          tests/bin/pki-artifacts-save.sh pki
        continue-on-error: true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ca-enrollment-pin-test
          path: /tmp/artifacts
